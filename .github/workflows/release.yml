name: 发布插件

on:
  push:
    tags:
      - "v*"

env:
  PLUGIN_NAME: LabVIEWCall
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # ── 1. 检出代码 ────────────────────────────────────────────────────
      - name: 检出代码
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # ── 2. 安装 .NET 8 ─────────────────────────────────────────────────
      - name: 安装 .NET 8
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── 3. 编译核心插件 ────────────────────────────────────────────────
      - name: 编译核心插件
        run: |
          dotnet build LabVIEWCall/LabVIEWCallPlugin/LabVIEWCallPlugin.csproj `
            -c Release -p:Platform=x86 `
            -p:OutputPath="$env:GITHUB_WORKSPACE\publish\${{ env.PLUGIN_NAME }}"

      # ── 4. 编译 UI 插件 ────────────────────────────────────────────────
      - name: 编译 UI 插件
        run: |
          dotnet build LabVIEWCall/LabVIEWCallPlugin.UI/LabVIEWCallPlugin.UI.csproj `
            -c Release -p:Platform=x86 `
            -p:OutputPath="$env:GITHUB_WORKSPACE\publish\${{ env.PLUGIN_NAME }}"

      # ── 5. 验证产物 ────────────────────────────────────────────────────
      - name: 验证编译产物
        run: |
          $files = Get-ChildItem "$env:GITHUB_WORKSPACE\publish\${{ env.PLUGIN_NAME }}" -ErrorAction Stop
          Write-Host "✅ 编译产物："
          $files | ForEach-Object { Write-Host "   $($_.Name)  ($([math]::Round($_.Length/1KB,1)) KB)" }

      # ── 6. 打包 ZIP ────────────────────────────────────────────────────
      - name: 打包 ZIP
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $zipName = "${{ env.PLUGIN_NAME }}-$version.zip"

          Compress-Archive `
            -Path "$env:GITHUB_WORKSPACE\publish\${{ env.PLUGIN_NAME }}\*" `
            -DestinationPath "$env:GITHUB_WORKSPACE\$zipName"

          $zipFile = Get-Item "$env:GITHUB_WORKSPACE\$zipName"
          Write-Host "✅ 已打包: $($zipFile.Name)  ($([math]::Round($zipFile.Length/1MB,2)) MB)"

          "ZIP_NAME=$zipName"    | Out-File -FilePath $env:GITHUB_ENV -Append
          "PLUGIN_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── 7. 创建 GitHub Release 并上传 ZIP ─────────────────────────────
      - name: 创建 Release 并上传插件包
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## ${{ env.PLUGIN_NAME }} ${{ github.ref_name }}

            ### 安装说明
            1. 下载 `${{ env.ZIP_NAME }}`
            2. 解压到 xTestPlatform 的 `Plugins\LabVIEWCall\` 目录
            3. 重启 xTestPlatform

            ### 更新内容
            请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解详细变更。
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. 更新版本清单 version.json ──────────────────────────────────
      - name: 更新版本清单
        run: |
          $tag         = "${{ github.ref_name }}"
          $version     = $env:PLUGIN_VERSION
          $zipName     = $env:ZIP_NAME
          $zipFile     = Get-Item "$env:GITHUB_WORKSPACE\$zipName"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$zipName"

          $manifest = [ordered]@{
            version      = $version
            releaseName  = "${{ env.PLUGIN_NAME }} $tag"
            releaseNotes = "请访问 GitHub Release 页面查看完整更新说明。"
            htmlUrl      = "https://github.com/${{ github.repository }}/releases/tag/$tag"
            assets       = @(
              [ordered]@{
                name        = $zipName
                downloadUrl = $downloadUrl
                size        = $zipFile.Length
              }
            )
          }

          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\docs" | Out-Null
          $manifest | ConvertTo-Json -Depth 5 |
            Set-Content "$env:GITHUB_WORKSPACE\docs\version.json" -Encoding UTF8

          Write-Host "✅ version.json 已生成"
          Write-Host "   版本:  $version"
          Write-Host "   文件:  $zipName"
          Write-Host "   大小:  $([math]::Round($zipFile.Length/1MB,2)) MB"
          Write-Host "   下载:  $downloadUrl"

      # ── 9. 将 version.json 提交回 master 分支 ─────────────────────────
      - name: 提交版本清单到 master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/version.json
          if (git diff --staged --quiet) {
            Write-Host "version.json 无变化，跳过提交"
          } else {
            git commit -m "chore: 更新版本清单至 ${{ github.ref_name }}"
            git push origin HEAD:master
          }